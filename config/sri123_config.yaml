job: extension
config:
  name: sri123_lora
  process:
    - type: 'sd_trainer'
      training_folder: '/root/ai-toolkit/output'
      device: cuda:0
      trigger_word: 'sri123'
      network:
        type: 'lora'
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 1
      datasets:
        - folder_path: '/root/ai-toolkit/dataset'
          caption_ext: 'txt'
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: 'flowmatch'
        optimizer: 'adamw8bit'
        lr: 0.0004
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16
      model:
        name_or_path: 'black-forest-labs/FLUX.1-dev'
        is_flux: true
        quantize: true
      sample:
        sampler: 'flowmatch'
        sample_every: 500
        width: 1024
        height: 1024
        prompts:
          - 'sri123, a young indian man, wearing a white shirt, natural daylight, photorealistic'
          - 'sri123, a young indian man, smiling, outdoor setting, photorealistic'
        neg: ''
        seed: 42
        walk_seed: true
        guidance_scale: 4
        sample_steps: 28
meta:
  name: 'sri123_lora'
  version: '1.0'
